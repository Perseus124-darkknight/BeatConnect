<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatConnect AI SDK Test (Bundled)</title>
    <!-- Use the newly bundled UMD model library -->
    <script src="./dist/beatconnect-ai-core.umd.js"></script>
    <style>
        body { background: #0b0b14; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .instructions { margin-top: 20px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
    <h1>BeatConnect AI SDK</h1>
    <p>Verification Success if Widget appears!</p>
    <div class="instructions">
        The widget should initialize automatically via the UMD script.
    </div>

    <script>
        console.log('[TEST] Checking SDK bundle...', window.BeatConnectAI);
        
        document.addEventListener('DOMContentLoaded', () => {
            try {
                // In UMD mode, Vite exports are sometimes nested or flattened
                const SDK = window.BeatConnectAI;
                const WidgetClass = SDK.ChatbotWidget || SDK; // Fallback if bundled differently

                const widget = new WidgetClass({
                    welcomeMessage: "Bundled SDK is live! How can I help?",
                    chatEndpoint: "http://localhost:3000/api/chat",
                    model: "llava:latest",
                    stream: true
                });
                
                widget.initialize();
                console.log('[TEST] Widget initialized from bundle.');
            } catch (e) {
                console.error('[TEST] Failed to initialize widget from bundle:', e);
            }
        });
    </script>
</body>
</html>
